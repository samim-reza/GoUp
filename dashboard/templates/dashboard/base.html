<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>GoUp Dashboard</title>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <style>
    :root {
      --ink: #12263a;
      --muted: #4b5d70;
      --bg: #f5f7fa;
      --card: #ffffff;
      --line: #d6dde6;
      --brand: #0f766e;
      --brand-strong: #115e59;
      --danger: #b91c1c;
      --ok: #166534;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 10% 20%, #e7f8f3 0%, transparent 38%),
        radial-gradient(circle at 90% 15%, #fdf2e8 0%, transparent 36%),
        var(--bg);
    }
    a { color: var(--brand); text-decoration: none; }
    .layout { display: grid; grid-template-columns: 260px 1fr; min-height: 100vh; }
    .sidebar {
      border-right: 1px solid var(--line);
      background: #f9fbfd;
      padding: 24px;
    }
    .brand { font-size: 26px; font-weight: 800; margin: 0 0 20px; }
    .muted { color: var(--muted); }
    .nav-btn {
      width: 100%;
      text-align: left;
      padding: 10px 12px;
      border: 1px solid var(--line);
      background: var(--card);
      border-radius: 10px;
      margin-bottom: 8px;
      cursor: pointer;
      font-weight: 600;
    }
    .nav-btn:hover { border-color: var(--brand); }
    .main { padding: 24px; }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 16px;
      box-shadow: 0 10px 24px rgba(17, 24, 39, 0.04);
    }
    .row { display: flex; gap: 12px; flex-wrap: wrap; }
    .row > * { flex: 1; min-width: 180px; }
    .grid-two { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .kpi { padding: 12px; border: 1px solid var(--line); border-radius: 10px; background: #fff; }
    .kpi h3 { margin: 0 0 4px; font-size: 15px; color: var(--muted); font-weight: 600; }
    .kpi p { margin: 0; font-size: 24px; font-weight: 700; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 10px; border-bottom: 1px solid var(--line); text-align: left; font-size: 14px; }
    th { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; }
    input, select, textarea {
      width: 100%;
      padding: 9px 10px;
      border: 1px solid #c8d2de;
      border-radius: 8px;
      background: #fff;
    }
    label { font-size: 13px; color: var(--muted); display: block; margin-bottom: 6px; }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 0;
      border-radius: 8px;
      padding: 9px 12px;
      cursor: pointer;
      font-weight: 600;
      background: var(--brand);
      color: #fff;
    }
    .btn:hover { background: var(--brand-strong); }
    .btn-secondary {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
    }
    .btn-danger { background: var(--danger); }
    .badge {
      display: inline-block;
      padding: 3px 8px;
      border-radius: 999px;
      background: #e8f5f4;
      color: var(--brand-strong);
      font-size: 12px;
      font-weight: 700;
    }
    .badge-fail { background: #fee2e2; color: #991b1b; }
    .badge-ok { background: #dcfce7; color: #166534; }
    .errorlist { color: #b91c1c; margin: 6px 0 0; padding-left: 18px; font-size: 13px; }
    .topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
    @media (max-width: 960px) {
      .layout { grid-template-columns: 1fr; }
      .sidebar { border-right: 0; border-bottom: 1px solid var(--line); }
      .grid-two { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  {% block body %}{% endblock %}
</body>
</html>
