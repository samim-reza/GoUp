<div class="card">
  <h3 style="margin-top:0;">Workspace Summary</h3>
  <p class="muted">High-level counts for connected assets and automation activity.</p>

  <div class="grid-two">
    <div class="kpi"><h3>Connected Pages</h3><p>{{ page_count }}</p></div>
    <div class="kpi"><h3>Lead Forms</h3><p>{{ form_count }}</p></div>
    <div class="kpi"><h3>Rules</h3><p>{{ rule_count }}</p></div>
    <div class="kpi"><h3>Templates</h3><p>{{ template_count }}</p></div>
    <div class="kpi"><h3>Leads</h3><p>{{ lead_count }}</p></div>
    <div class="kpi"><h3>Message Logs</h3><p>{{ log_count }}</p></div>
  </div>
</div>
